name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release after build'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron Windows artifacts
        working-directory: packages/electron
        shell: bash
        env:
          ELECTRON_BUILDER_ARCH: x64
        run: |
          bun run build:web-assets
          bun run bundle:main
          bun run rebuild:native
          node ./scripts/package.mjs --win --x64 --publish=never

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Installer
          path: |
            packages/electron/dist/*.exe
            packages/electron/dist/*.blockmap
            !packages/electron/dist/*-portable.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload portable version
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Portable
          path: packages/electron/dist/*-portable.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload latest.yml for auto-update
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Update-Metadata
          path: packages/electron/dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Checkout for tag generation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            BASE=$(node -p "require('./package.json').version")
            TIMESTAMP=$(date +'%Y%m%d%H%M')
            TAG="v${BASE}-build.${TIMESTAMP}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpenChamberX ${{ steps.version.outputs.tag }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            OpenChamberX-Installer/*.exe
            OpenChamberX-Installer/*.blockmap
            OpenChamberX-Portable/*.exe
            OpenChamberX-Update-Metadata/latest.yml
          generate_release_notes: true
