name: Build Windows Installer

on:
  push:
    branches: [main, feat/linux-desktop]
    tags: ['v*'] # 修复：去掉了反斜杠，现在能正确匹配 v1.0.0、v2.1.3 等标签了
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI library
        run: bun run --cwd packages/ui build

      - name: Build web app
        run: bun run --cwd packages/web build

      - name: Build Electron web assets
        run: bun run --cwd packages/electron build:web-assets

      - name: Bundle Electron main process
        run: bun run --cwd packages/electron bundle:main

      - name: Package Windows installer
        run: bun run --cwd packages/electron package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Installer
          path: packages/electron/dist/*.exe # 修复：恢复正常通配符
          if-no-files-found: warn

      - name: Upload portable version
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Portable
          path: packages/electron/dist/*-portable.exe # 修复：恢复正常通配符
          if-no-files-found: warn

      - name: Upload latest.yml for auto-update
        uses: actions/upload-artifact@v4
        with:
          name: OpenChamberX-Update-Metadata
          path: packages/electron/dist/latest.yml
          if-no-files-found: ignore
  release:
    # 允许在推送 main 分支、手动触发（workflow_dispatch）或推送 v 标签时都执行发布
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 如果是标签触发，就用标签名；如果是推送 main，就自动命名为 latest 滚动版
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Automated Build' }}
          # 如果是 main 分支的自动构建，将其标记为预发布（Prerelease），避免覆盖正式版提示
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            OpenChamberX-Installer/*.exe
            OpenChamberX-Portable/*.exe
            OpenChamberX-Update-Metadata/latest.yml
          generate_release_notes: true
          