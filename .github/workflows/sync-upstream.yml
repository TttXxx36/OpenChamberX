name: Sync Upstream

# ============================================================
# 自动同步 openchamber/openchamber 上游到本 fork
# - 每天 UTC 06:00 自动检查
# - 也可手动触发（指定 tag/SHA/策略）
# - 有冲突时不强推，开 Issue 提示人工
# - 合并成功则开 PR 等待人工 review 后合入
# ============================================================

on:
  # 每天 UTC 06:00（北京时间 14:00）自动检查上游更新
  schedule:
    - cron: '0 6 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游 ref（tag/branch/commit SHA），留空则取最新 tag'
        required: false
        default: ''
      strategy:
        description: '冲突解决策略'
        required: false
        default: 'recursive_ours'
        type: choice
        options:
          - recursive_ours     # 冲突时优先保留 fork（最安全）
          - recursive_theirs   # 冲突时优先采用上游（风险高）
          - ort                # Git 默认 3-way merge

  # 触发本 workflow 的配置文件变更时也跑一次
  push:
    paths:
      - '.github/sync-config/**'
      - '.github/workflows/sync-upstream.yml'
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

# 防止多个 sync 并发
concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ------------------------------------------------------
      # 1. 拉取 fork 完整历史
      # ------------------------------------------------------
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------
      # 2. 配置 Git 身份（必须用 bot 身份提交）
      # ------------------------------------------------------
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ------------------------------------------------------
      # 3. 添加 upstream 并拉取
      # ------------------------------------------------------
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openchamber/openchamber.git
          git remote -v
          git fetch upstream --tags --force --prune --prune-tags

      # ------------------------------------------------------
      # 4. 决定要同步的目标 ref
      # ------------------------------------------------------
      - name: Resolve target ref
        id: target
        run: |
          INPUT_REF="${{ inputs.upstream_ref }}"
          if [ -n "$INPUT_REF" ]; then
            TARGET="$INPUT_REF"
            echo "Manual target: $TARGET"
          else
            # 自动取最新版本 tag（v* 格式）
            TARGET=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
            if [ -z "$TARGET" ]; then
              # 没有 tag 则取 main
              TARGET="main"
            fi
            echo "Auto-detected latest tag: $TARGET"
          fi

          # 解析为完整 commit SHA
          TARGET_SHA=$(git rev-parse "upstream/$TARGET^{commit}" 2>/dev/null \
            || git rev-parse "upstream/$TARGET" 2>/dev/null \
            || echo "")

          if [ -z "$TARGET_SHA" ]; then
            echo "::error::Cannot resolve upstream ref: $TARGET"
            exit 1
          fi

          SHORT_SHA="${TARGET_SHA:0:7}"
          echo "ref=$TARGET" >> "$GITHUB_OUTPUT"
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "→ Targeting upstream/$TARGET @ $SHORT_SHA"

      # ------------------------------------------------------
      # 5. 检查是否已同步
      # ------------------------------------------------------
      - name: Check sync status
        id: check
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"

          if git merge-base --is-ancestor "$TARGET_SHA" main; then
            echo "status=already_synced" >> "$GITHUB_OUTPUT"
            echo "✓ main already contains $TARGET_SHA — nothing to do"
            exit 0
          fi

          BEHIND=$(git rev-list --count main.."$TARGET_SHA" 2>/dev/null || echo "?")
          AHEAD=$(git rev-list --count "$TARGET_SHA"..main 2>/dev/null || echo "?")
          echo "status=needs_sync" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "→ fork main is $BEHIND commits behind upstream, $AHEAD ahead"

      # ------------------------------------------------------
      # 6. 创建同步分支
      # ------------------------------------------------------
      - name: Create sync branch
        if: steps.check.outputs.status == 'needs_sync'
        env:
          BRANCH: sync/upstream-${{ steps.target.outputs.ref }}-${{ steps.target.outputs.short_sha }}
        run: |
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH" main
          git log --oneline -3

      # ------------------------------------------------------
      # 7. 加载保护路径
      # ------------------------------------------------------
      - name: Load protected paths
        id: protected
        run: |
          mkdir -p /tmp/sync
          if [ -f .github/sync-config/protected-paths.txt ]; then
            echo "→ Using custom protected-paths.txt"
            grep -v '^\s*#' .github/sync-config/protected-paths.txt \
              | grep -v '^\s*$' > /tmp/sync/protected.txt
          else
            echo "::warning::No protected-paths.txt found, using empty list"
            : > /tmp/sync/protected.txt
          fi
          echo "→ Protected paths:"
          sed 's/^/   /' /tmp/sync/protected.txt

      # ------------------------------------------------------
      # 8. 尝试合并
      # ------------------------------------------------------
      - name: Attempt merge
        if: steps.check.outputs.status == 'needs_sync'
        id: merge
        env:
          STRATEGY: ${{ inputs.strategy }}
          TARGET: ${{ steps.target.outputs.sha }}
        run: |
          case "$STRATEGY" in
            recursive_ours)
              MERGE_OPTS=(--no-ff -X ours)
              ;;
            recursive_theirs)
              MERGE_OPTS=(--no-ff -X theirs)
              ;;
            ort)
              MERGE_OPTS=(--no-ff)
              ;;
            *)
              MERGE_OPTS=(--no-ff -X ours)
              ;;
          esac

          COMMIT_MSG="chore(sync): merge upstream ${{ steps.target.outputs.ref }} (${{ steps.target.outputs.short_sha }}) into fork

Strategy: $STRATEGY
Upstream commit: $TARGET
Preserved regions: see .github/sync-config/protected-paths.txt

Co-authored-by: openchamber upstream <noreply@github.com>"

          echo "→ Running: git merge ${MERGE_OPTS[*]} $TARGET"

          if git merge "${MERGE_OPTS[@]}" -m "$COMMIT_MSG" "$TARGET"; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✓ Merge succeeded with strategy=$STRATEGY"
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U > /tmp/sync/conflicts.txt
            echo "::warning::Merge has conflicts. Conflicting files:"
            sed 's/^/   /' /tmp/sync/conflicts.txt
            # 保留冲突状态（不 abort），后续在 issue 中给出解决步骤
          fi

      # ------------------------------------------------------
      # 9a. 合并成功：推送分支并开 PR
      # ------------------------------------------------------
      - name: Push sync branch
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'success'
        env:
          BRANCH: sync/upstream-${{ steps.target.outputs.ref }}-${{ steps.target.outputs.short_sha }}
        run: |
          git push -u origin "$BRANCH"

      - name: Open sync PR
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'success'
        uses: actions/github-script@v7
        env:
          BRANCH: sync/upstream-${{ steps.target.outputs.ref }}-${{ steps.target.outputs.short_sha }}
          TARGET_REF: ${{ steps.target.outputs.ref }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          SHORT_SHA: ${{ steps.target.outputs.short_sha }}
          STRATEGY: ${{ inputs.strategy }}
          BEHIND: ${{ steps.check.outputs.behind }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const target = process.env.TARGET_REF;
            const sha = process.env.SHORT_SHA;
            const strategy = process.env.STRATEGY;
            const behind = process.env.BEHIND;

            // 检查是否已存在同分支的 PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length > 0) {
              core.info(`PR already exists: ${prs[0].html_url}`);
              return;
            }

            const body = [
              '## 🔄 上游自动同步 PR',
              '',
              `**目标版本**: \`openchamber/openchamber@${target}\` (${sha})`,
              `**落后 commit 数**: ${behind}`,
              `**合并策略**: \`${strategy}\``,
              '',
              '### 保留区文件（preserved）',
              '- `.github/workflows/*` — 8 个自定义 workflow',
              '- `package.json`（×6） + `bun.lock` — 自定义依赖',
              '- `useUIStore` (deprecated) + `useNotificationStore` (新增)',
              '- `formatSdkError` + `event-reducer` 性能优化',
              '- `electron/main.*` — uncaughtException 安全网',
              '- 7 语言 i18n 扩展（sessionRename 的 emptyTitle/error）',
              '- 文档：README.md, CHANGELOG.md, AGENTS.md',
              '',
              '### 操作清单',
              '- [ ] 人工 review diff',
              '- [ ] `bun install && bun run typecheck && bun run test`',
              '- [ ] `bun run build:package` 验证打包',
              '- [ ] 验证 8 个 GitHub Actions workflow 仍工作',
              '- [ ] 更新 CHANGELOG.md 顶部 Unreleased 段',
              '- [ ] 决定版本号（建议 `<upstream>-OpenChamberX.1`）',
              '',
              '### 提示',
              '如需对单次合并做精细控制，可使用 `prompts/merge-upstream.md` 提示词手动合并。',
              '',
              '---',
              '_由 `sync-upstream` workflow 自动生成_',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 chore(sync): merge upstream ${target}`,
              head: branch,
              base: 'main',
              body: body,
            });
            core.info(`PR opened: ${pr.data.html_url}`);

      # ------------------------------------------------------
      # 9b. 合并失败：开 Issue 并清理分支
      # ------------------------------------------------------
      - name: Abort merge and clean
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'conflict'
        run: |
          git merge --abort || true
          echo "→ Merge aborted"

      - name: Open conflict issue
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        env:
          TARGET_REF: ${{ steps.target.outputs.ref }}
          SHORT_SHA: ${{ steps.target.outputs.short_sha }}
        with:
          script: |
            const target = process.env.TARGET_REF;
            const sha = process.env.SHORT_SHA;
            const conflicts = require('fs').readFileSync('/tmp/sync/conflicts.txt', 'utf8').trim();

            if (!conflicts) {
              core.warning('No conflicting files detected, skipping issue creation');
              return;
            }

            // 避免重复开 issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict',
            });
            const existing = issues.find(i => i.title.includes(target) && i.title.includes(sha));
            if (existing) {
              core.info(`Conflict issue already exists: #${existing.number}`);
              return;
            }

            const body = [
              `## ⚠️ 上游同步冲突`,
              '',
              `**目标版本**: \`openchamber/openchamber@${target}\` (${sha})`,
              '',
              '### 冲突文件',
              '```',
              conflicts,
              '```',
              '',
              '### 解决步骤',
              '1. 在本地 fork 仓库拉取最新：',
              '   ```bash',
              `   git fetch upstream`,
              `   git checkout sync/upstream-${target}-${sha}`,
              '   ```',
              '2. 重新尝试合并：',
              '   ```bash',
              `   git merge upstream/${target}`,
              '   ```',
              '3. 手动解决冲突（参考 `prompts/merge-upstream.md` 提示词）',
              '4. 提交并推送：',
              '   ```bash',
              `   git commit -m "fix: resolve sync conflicts from upstream ${target}"`,
              `   git push origin sync/upstream-${target}-${sha}`,
              '   ```',
              '5. workflow 会自动检测并开 PR',
              '',
              '### 参考',
              '- 合并提示词: `prompts/merge-upstream.md`',
              '- 保护路径配置: `.github/sync-config/protected-paths.txt`',
              '- 同步文档: `docs/SYNC.md`',
              '',
              '---',
              '_由 `sync-upstream` workflow 自动生成_',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Sync conflict: upstream ${target} (${sha})`,
              body: body,
              labels: ['sync-conflict', 'upstream-sync'],
            });
            core.info(`Conflict issue opened: #${issue.data.number}`);

      # ------------------------------------------------------
      # 10. 总结
      # ------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          {
            echo "## 🔄 Sync Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Target | \`${{ steps.target.outputs.ref }}\` (\`${{ steps.target.outputs.short_sha }}\`) |"
            echo "| Status | \`${{ steps.check.outputs.status }}\` |"
            if [ "${{ steps.check.outputs.status }}" == "needs_sync" ]; then
              echo "| Behind | ${{ steps.check.outputs.behind }} commits |"
              echo "| Ahead | ${{ steps.check.outputs.ahead }} commits |"
              echo "| Strategy | \`${{ inputs.strategy }}\` |"
              echo "| Merge | \`${{ steps.merge.outputs.result }}\` |"
            fi
            echo ""
            echo "_Generated at $(date -u +%FT%TZ)_"
          } >> "$GITHUB_STEP_SUMMARY"
