name: Sync Upstream

# ============================================================
# 自动同步 openchamber/openchamber 上游到本 fork
# - 每天 UTC 06:00 自动检查
# - 也可手动触发（指定 tag/SHA）
# - 三段式保护路径策略：
#   [PRESERVE]  完全保留 fork → 用 --ours
#   [MERGE_SAFE] 尝试合并，冲突留 fork → 用 --ours
#   [STREAM]    直接接受上游 → 用 --theirs
# - 有冲突时开 Issue 提示人工
# ============================================================

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      upstream_ref:
        description: '上游 ref（tag/branch/commit SHA），留空则取最新 tag'
        required: false
        default: ''

  push:
    paths:
      - '.github/sync-config/**'
      - '.github/workflows/sync-upstream.yml'
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openchamber/openchamber.git
          git fetch upstream --tags --force --prune --prune-tags

      - name: Resolve target ref
        id: target
        run: |
          INPUT_REF="${{ inputs.upstream_ref }}"
          if [ -n "$INPUT_REF" ]; then
            TARGET="$INPUT_REF"
          else
            TARGET=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
            [ -z "$TARGET" ] && TARGET="main"
            echo "Auto-detected latest tag: $TARGET"
          fi

          TARGET_SHA=$(git rev-parse "refs/tags/$TARGET^{commit}" 2>/dev/null \
            || git rev-parse "refs/tags/$TARGET" 2>/dev/null \
            || git rev-parse "v${TARGET#v}^{commit}" 2>/dev/null \
            || git rev-parse "$TARGET^{commit}" 2>/dev/null \
            || git rev-parse "$TARGET" 2>/dev/null \
            || git rev-parse "upstream/$TARGET^{commit}" 2>/dev/null \
            || git rev-parse "upstream/$TARGET" 2>/dev/null \
            || { echo "::error::Cannot resolve upstream ref: $TARGET"; exit 1; })

          SHORT_SHA="${TARGET_SHA:0:7}"
          echo "ref=$TARGET" >> "$GITHUB_OUTPUT"
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "→ Targeting upstream/$TARGET @ $SHORT_SHA"

      - name: Check sync status
        id: check
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          if git merge-base --is-ancestor "$TARGET_SHA" main; then
            echo "status=already_synced" >> "$GITHUB_OUTPUT"
            echo "✓ main already contains $TARGET_SHA — nothing to do"
            exit 0
          fi

          BEHIND=$(git rev-list --count main.."$TARGET_SHA" 2>/dev/null || echo "?")
          AHEAD=$(git rev-list --count "$TARGET_SHA"..main 2>/dev/null || echo "?")
          echo "status=needs_sync" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "→ fork main is $BEHIND commits behind upstream, $AHEAD ahead"

      - name: Create sync branch
        if: steps.check.outputs.status == 'needs_sync'
        env:
          BRANCH: sync/upstream-${{ steps.target.outputs.ref }}-${{ steps.target.outputs.short_sha }}
        run: |
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH" main

      - name: Parse protected paths
        id: protected
        run: |
          mkdir -p /tmp/sync
          # 提取三段式路径
          awk 'BEGIN{sec=""; p=0; m=0; s=0}
            /^\[PRESERVE\]/  {sec="preserve"; next}
            /^\[MERGE_SAFE\]/{sec="mergesafe"; next}
            /^\[STREAM\]/    {sec="stream"; next}
            /^#/ || /^$/    {next}
            sec=="preserve"  {print > "/tmp/sync/preserve.txt"; p++}
            sec=="mergesafe" {print > "/tmp/sync/mergesafe.txt"; m++}
            sec=="stream"    {print > "/tmp/sync/stream.txt"; s++}
            END{printf "preserve=%d\nmergesafe=%d\nstream=%d\n", p, m, s > "/dev/stderr"}
          ' .github/sync-config/protected-paths.txt

      - name: Attempt merge with three-tier strategy
        if: steps.check.outputs.status == 'needs_sync'
        id: merge
        env:
          TARGET: ${{ steps.target.outputs.sha }}
        run: |
          COMMIT_MSG="chore(sync): merge upstream ${{ steps.target.outputs.ref }} (${{ steps.target.outputs.short_sha }}) into fork

      Strategy: --no-commit with three-tier protected-path handling
      Upstream commit: $TARGET

      Co-authored-by: openchamber upstream <noreply@github.com>"

          # 第 1 步：尝试合并但不提交
          echo "→ Running: git merge --no-ff --no-commit $TARGET"
          if git merge --no-ff --no-commit "$TARGET"; then
            # 无冲突，正常提交
            git commit -m "$COMMIT_MSG"
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✓ Merge succeeded (no conflicts)"
            exit 0
          fi

          # 第 2 步：有冲突 — 按三段式处理
          echo "::warning::Merge has conflicts, applying three-tier strategy"

          UNRESOLVED=/tmp/sync/remaining.txt

          # 2a: [STREAM] — 用上游版本
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $(git diff --name-only --diff-filter=U); do
              # 将 /packages/*/ 转换为 glob 匹配
              globbed="${pattern//\/packages\/\*\//packages\/*\/}"
              if [[ "$file" == $globbed ]]; then
                git checkout --theirs "$file"
                git add "$file"
                echo "  [STREAM] $file — accepted upstream"
              fi
            done
          done < /tmp/sync/stream.txt

          # 2b: [PRESERVE] — 保留 fork 版本
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $(git diff --name-only --diff-filter=U); do
              globbed="${pattern//\/packages\/\*\//packages\/*\/}"
              if [[ "$file" == $globbed ]]; then
                git checkout --ours "$file"
                git add "$file"
                echo "  [PRESERVE] $file — kept fork"
              fi
            done
          done < /tmp/sync/preserve.txt

          # 2c: [MERGE_SAFE] — 冲突时保留 fork
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $(git diff --name-only --diff-filter=U); do
              globbed="${pattern//\/packages\/\*\//packages\/*\/}"
              if [[ "$file" == $globbed ]]; then
                git checkout --ours "$file"
                git add "$file"
                echo "  [MERGE_SAFE] $file — fork wins on conflict"
              fi
            done
          done < /tmp/sync/mergesafe.txt

          # 2d: 检查剩余冲突
          git diff --name-only --diff-filter=U > "$UNRESOLVED" || true
          if [ -s "$UNRESOLVED" ]; then
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "::warning::Remaining unresolved conflicts:"
            sed 's/^/   /' "$UNRESOLVED"
          else
            # 所有冲突已解决，提交
            git commit -m "$COMMIT_MSG"
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✓ Merge succeeded (conflicts resolved via three-tier strategy)"
          fi

      - name: Push sync branch
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'success'
        run: |
          git push -u origin "$BRANCH"

      - name: Open sync PR
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'success'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ env.BRANCH }}
          TARGET_REF: ${{ steps.target.outputs.ref }}
          SHORT_SHA: ${{ steps.target.outputs.short_sha }}
          BEHIND: ${{ steps.check.outputs.behind }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const target = process.env.TARGET_REF;
            const sha = process.env.SHORT_SHA;
            const behind = process.env.BEHIND;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length > 0) {
              core.info(`PR already exists: ${prs[0].html_url}`);
              return;
            }

            const body = [
              '## 🔄 上游自动同步 PR',
              '',
              `**目标版本**: \`openchamber/openchamber@${target}\` (${sha})`,
              `**落后 commit 数**: ${behind}`,
              '',
              '### 合并策略',
              '- `[PRESERVE]` fork 独有功能完整保留',
              '- `[MERGE_SAFE]` 自动合并，冲突保留 fork',
              '- `[STREAM]` 直接采用上游',
              '',
              '### 操作清单',
              '- [ ] 人工 review diff',
              '- [ ] 验证 8 个 GitHub Actions workflow 仍工作',
              '- [ ] 更新 CHANGELOG.md',
              '',
              '---',
              '_由 sync-upstream workflow 自动生成_',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 chore(sync): merge upstream ${target}`,
              head: branch,
              base: 'main',
              body: body,
            });
            core.info(`PR opened: ${pr.data.html_url}`);

      - name: Abort merge
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'conflict'
        run: |
          git merge --abort || true
          echo "→ Merge aborted"

      - name: Open conflict issue
        if: steps.check.outputs.status == 'needs_sync' && steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        env:
          TARGET_REF: ${{ steps.target.outputs.ref }}
          SHORT_SHA: ${{ steps.target.outputs.short_sha }}
        with:
          script: |
            const fs = require('fs');
            const target = process.env.TARGET_REF;
            const sha = process.env.SHORT_SHA;
            const conflictsFile = '/tmp/sync/remaining.txt';

            let conflicts = '';
            try { conflicts = fs.readFileSync(conflictsFile, 'utf8').trim(); } catch { }
            if (!conflicts) {
              core.warning('No conflicting files detected, skipping issue');
              return;
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict',
            });
            const existing = issues.find(i => i.title.includes(target) && i.title.includes(sha));
            if (existing) {
              core.info(`Conflict issue already exists: #${existing.number}`);
              return;
            }

            const body = [
              `## ⚠️ 上游同步冲突 — 需人工处理`,
              '',
              `**目标版本**: \`openchamber/openchamber@${target}\` (${sha})`,
              '',
              '### 未解决的冲突文件',
              '```',
              conflicts,
              '```',
              '',
              '这些文件不属于 [PRESERVE]/[MERGE_SAFE]/[STREAM] 三段式分类，',
              '需要人工判断如何合并。',
              '',
              '### 解决步骤',
              '1. 本地拉取同步分支：',
              '   ```bash',
              `   git fetch origin sync/upstream-${target}-${sha}`,
              `   git checkout sync/upstream-${target}-${sha}`,
              '   ```',
              '2. 查看冲突：`git diff --name-only --diff-filter=U`',
              '3. 手动解决冲突',
              '4. `git add . && git commit`',
              '5. `git push origin sync/upstream-${target}-${sha}`',
              '',
              '### 参考',
              '- 合并提示词: `prompts/merge-upstream.md`',
              '- 保护路径配置: `.github/sync-config/protected-paths.txt`',
              '',
              '---',
              '_由 sync-upstream workflow 自动生成_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Sync conflict: upstream ${target} (${sha})`,
              body: body,
              labels: ['sync-conflict', 'upstream-sync'],
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🔄 Sync Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Target | \`${{ steps.target.outputs.ref }}\` (\`${{ steps.target.outputs.short_sha }}\`) |"
            echo "| Status | \`${{ steps.check.outputs.status }}\` |"
            if [ "${{ steps.check.outputs.status }}" == "needs_sync" ]; then
              echo "| Behind | ${{ steps.check.outputs.behind }} commits |"
              echo "| Ahead | ${{ steps.check.outputs.ahead }} commits |"
              echo "| Merge | \`${{ steps.merge.outputs.result }}\` |"
            fi
            echo ""
            echo "_Generated at $(date -u +%FT%TZ)_"
          } >> "$GITHUB_STEP_SUMMARY"
